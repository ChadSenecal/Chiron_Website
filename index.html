<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHIRON Robotics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      background: #0f0a00;
      color: #f5e8c7;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    /* ─── NAVBAR ─────────────────────────────── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 68px;
      background: rgba(15, 10, 0, 0.95);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
      border-bottom: 2px solid #d4af37;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-icon svg {
      width: 32px;
      height: 32px;
      display: block;
    }

    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #ffd700;
      text-transform: uppercase;
    }

    /* Desktop Navigation */
    .nav-center {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-center a,
    .dropbtn {
      font-size: 0.95rem;
      font-weight: 500;
      color: #f5e8c7;
      text-decoration: none;
      padding: 8px 18px;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .nav-center a:hover,
    .dropbtn:hover {
      color: #ffd700;
      text-shadow: 0 0 8px rgba(212, 175, 55, 0.5);
    }

    .nav-center a:focus-visible,
    .dropbtn:focus-visible,
    .hamburger:focus-visible,
    .boink-btn:focus-visible,
    .cta-button:focus-visible {
      outline: 2px solid #ffd700;
      outline-offset: 4px;
    }

    /* Dropdown */
    .dropdown {
      position: relative;
      display: inline-block;
    }

    .dropbtn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dropbtn::after {
      content: "▼";
      font-size: 0.75rem;
      transition: transform 0.3s ease;
    }

    .dropdown:hover .dropbtn::after {
      transform: rotate(180deg);
    }

    .dropdown-content {
      display: none;
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: #1c1405;
      min-width: 180px;
      border: 2px solid #d4af37;
      border-radius: 8px;
      z-index: 101;
      padding: 8px 0;
      margin-top: 8px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    .dropdown-content a,
    .dropdown-content span {
      color: #f5e8c7;
      padding: 12px 24px;
      display: block;
      transition: all 0.2s;
    }

    .dropdown-content a:hover {
      background: #d4af37;
      color: #0f0a00;
      padding-left: 32px;
    }

    .dropdown-content span {
      color: rgba(245, 232, 199, 0.42);
      cursor: default;
    }

    /* Right Side Buttons */
    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    /* Boink Button */
    .boink-btn {
      background: #08090d;
      border: 2px solid #d4af37;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.55rem;
      cursor: pointer;
      transition: all 0.25s;
      flex-shrink: 0;
      overflow: hidden;
      padding: 5px;
    }

    .boink-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }

    .boink-btn:hover {
      background: #d4af37;
      color: #0f0a00;
      transform: scale(1.1);
    }

    .boink-btn.boinking {
      animation: boink-pop 0.45s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    }

    @keyframes boink-pop {
      0% {
        transform: scale(1) rotate(0deg);
      }

      30% {
        transform: scale(1.65) rotate(-12deg);
      }

      55% {
        transform: scale(0.82) rotate(9deg);
      }

      80% {
        transform: scale(1.2) rotate(-5deg);
      }

      100% {
        transform: scale(1) rotate(0deg);
      }
    }

    /* Hamburger */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 6px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 8px;
    }

    .hamburger span {
      display: block;
      width: 26px;
      height: 3px;
      background: #d4af37;
    }

    /* Mobile Menu */
    .mobile-menu {
      display: none;
      position: fixed;
      top: 68px;
      left: 0;
      right: 0;
      background: #1c1405;
      border-bottom: 3px solid #d4af37;
      flex-direction: column;
      z-index: 99;
    }

    .mobile-menu.open {
      display: flex;
    }

    .mobile-menu .team-header,
    .mobile-menu a,
    .mobile-menu span {
      font-size: 1.05rem;
      color: #f5e8c7;
      padding: 18px 28px;
      border-bottom: 1px solid #3a2a00;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .mobile-menu span {
      color: rgba(245, 232, 199, 0.42);
      cursor: default;
    }

    .mobile-submenu {
      display: none;
      flex-direction: column;
      background: #2a2008;
    }

    .mobile-submenu.open {
      display: flex;
    }

    .mobile-submenu a,
    .mobile-submenu span {
      padding-left: 60px;
      font-size: 1rem;
    }

    /* Hero Section */
    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background:
        radial-gradient(circle at center, rgba(212, 175, 55, 0.18) 0%, transparent 34rem),
        linear-gradient(180deg, #160f02 0%, #0f0a00 72%);
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: center/cover no-repeat;
      opacity: 0.85;
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 20px;
    }

    .main-logo {
      width: 340px;
      max-width: 85vw;
      background: rgba(15, 10, 0, 0.46);
      border: 1px solid rgba(212, 175, 55, 0.36);
      border-radius: 50%;
      padding: 22px;
      filter: drop-shadow(0 18px 34px rgba(0, 0, 0, 0.42)) drop-shadow(0 0 24px rgba(212, 175, 55, 0.34));
      margin-bottom: 28px;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3.8rem;
      color: #ffd700;
      margin-bottom: 16px;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
    }

    .hero p {
      font-size: 1.25rem;
      max-width: 620px;
      margin: 0 auto 40px;
      color: #e8d9b0;
      line-height: 1.6;
    }

    .cta-button {
      background: #d4af37;
      color: #0f0a00;
      padding: 14px 42px;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 0 rgba(212, 175, 55, 0);
    }

    .cta-button:hover,
    .cta-button:focus-visible {
      transform: scale(1.08);
      background: #ffd700;
      box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.22), 0 0 30px rgba(212, 175, 55, 0.7);
    }

    /* Footer */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(15, 10, 0, 0.98);
      border-top: 2px solid #d4af37;
      padding: 18px 24px;
      text-align: center;
      font-size: 0.82rem;
      color: #b38b2e;
      letter-spacing: 1px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .nav-center {
        display: none;
      }

      .hamburger {
        display: flex;
      }

      .nav-right {
        gap: 10px;
      }

      .hero h1 {
        font-size: 2.8rem;
      }

      .main-logo {
        width: 260px;
        padding: 16px;
      }
    }

    @media (min-width: 769px) {
      .hamburger {
        display: none;
      }

      .mobile-menu {
        display: none !important;
      }
    }
  </style>
</head>

<body>

  <nav>
    <a href="./index.html" class="nav-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M11 2C11 2 4 5.2 4 11.8C4 16.8 7.2 19.6 11 20C14.8 19.6 18 16.8 18 11.8C18 5.2 11 2 11 2Z"
            stroke="#d4af37" stroke-width="1.8" fill="none" />
          <path
            d="M11 6.5C11 6.5 7.8 8.5 7.8 12C7.8 14.6 9.2 16.2 11 16.8C12.8 16.2 14.2 14.6 14.2 12C14.2 8.5 11 6.5 11 6.5Z"
            fill="#d4af37" />
        </svg>
      </div>
      <span class="logo-text">CHIRON</span>
    </a>

    <div class="nav-center">
      <div class="dropdown">
        <button class="dropbtn">Team</button>
        <div class="dropdown-content">
          <a href="./Team/Chad.html#chad">Chad</a>
          <a href="./Team/Chad.html#andre">Andre</a>
          <a href="./Team/Chad.html#dominick">Dominick</a>

          <a href="./Team/Chad.html#zahid">Zahid</a>

        </div>
      </div>
      <a href="./Documentation/documentation.html">Documentation</a>

    </div>

    <div class="nav-right">
      <button class="hamburger" id="hamburger" aria-label="Open menu">

  <div class="mobile-menu" id="mobileMenu">
    <div class="team-header" id="teamHeader">
      Team <span id="teamArrow">▼</span>
    </div>
    <div class="mobile-submenu" id="mobileSubmenu">
      <a href="./Team/Chad.html#chad">Chad</a>
      <a href="./Team/Chad.html#andre">Andre</a>
      <a href="./Team/Chad.html#dominick">Dominick</a>

  <footer>
    <div>CHIRON ROBOTICS • 2026</div>
  </footer>

  <script>
    // Boink Sound + Animation
    const boinkBtn = document.getElementById('boinkBtn');

    const soundCycle = [
      { type: 'sine', notes: [392, 523.25, 659.25], duration: 0.24, volume: 0.1 },
      { type: 'triangle', notes: [440, 554.37, 739.99], duration: 0.22, volume: 0.085 },
      { type: 'sine', notes: [523.25, 659.25, 783.99], duration: 0.26, volume: 0.085 },
      { type: 'triangle', notes: [329.63, 392, 493.88], duration: 0.25, volume: 0.08 }
    ];
    let soundIndex = 0;

    function playBoink() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const now = ctx.currentTime;
      const preset = soundCycle[soundIndex % soundCycle.length];
      soundIndex += 1;
      const step = preset.duration / preset.notes.length;

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = preset.type;
      preset.notes.forEach((note, index) => {
        const at = now + index * step;
        if (index === 0) {
          osc.frequency.setValueAtTime(note, at);
        } else {
          osc.frequency.exponentialRampToValueAtTime(note, at);
        }
      });
      gain.gain.setValueAtTime(0.001, now);
      gain.gain.exponentialRampToValueAtTime(preset.volume, now + 0.018);
      gain.gain.exponentialRampToValueAtTime(0.001, now + preset.duration);
      osc.start(now);
      osc.stop(now + preset.duration + 0.03);
    }

    boinkBtn.addEventListener('click', () => {
      playBoink();
      boinkBtn.classList.remove('boinking');
      void boinkBtn.offsetWidth;
      boinkBtn.classList.add('boinking');
      boinkBtn.addEventListener('animationend', () => boinkBtn.classList.remove('boinking'), { once: true });
    });

    // Mobile Menu
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    const teamHeader = document.getElementById('teamHeader');
    const mobileSubmenu = document.getElementById('mobileSubmenu');
    const teamArrow = document.getElementById('teamArrow');

    hamburger.addEventListener('click', () => mobileMenu.classList.toggle('open'));

    teamHeader.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = mobileSubmenu.classList.toggle('open');
      teamArrow.style.transform = isOpen ? 'rotate(180deg)' : '';
    });

    mobileMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => mobileMenu.classList.remove('open'));
    });
  </script>
