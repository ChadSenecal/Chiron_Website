<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CHIRON Robotics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #0a0b0f;
      color: #fff;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    /* ─── NAVBAR ─────────────────────────────── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      background: #0a0b0f;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-icon svg { width: 22px; height: 22px; display: block; }

    .logo-text {
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: #fff;
      text-transform: uppercase;
    }

    .nav-center {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .nav-center a {
      font-size: 0.82rem;
      font-weight: 400;
      color: rgba(255,255,255,0.65);
      text-decoration: none;
      padding: 6px 14px;
      transition: color 0.15s;
      white-space: nowrap;
    }

    .nav-center a:hover { color: #fff; }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    /* ─── BOINK BUTTON ─────────────────────────── */
    .boink-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 50%;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .boink-btn:hover {
      border-color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.06);
    }

    .boink-btn.boinking {
      animation: boink-pop 0.38s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    }

    @keyframes boink-pop {
      0%   { transform: scale(1); }
      25%  { transform: scale(1.55) rotate(-8deg); }
      55%  { transform: scale(0.85) rotate(6deg); }
      75%  { transform: scale(1.18) rotate(-3deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    /* ─── HAMBURGER (mobile only) ─────────────── */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }

    .hamburger span {
      display: block;
      width: 20px;
      height: 1.5px;
      background: rgba(255,255,255,0.8);
      transition: all 0.2s;
    }

    /* ─── MOBILE MENU ─────────────────────────── */
    .mobile-menu {
      display: none;
      position: fixed;
      top: 52px; left: 0; right: 0;
      background: #0a0b0f;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-direction: column;
      z-index: 99;
    }

    .mobile-menu.open { display: flex; }

    .mobile-menu a {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      padding: 15px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: color 0.15s, background 0.15s;
    }

    .mobile-menu a:hover {
      color: #fff;
      background: rgba(255,255,255,0.04);
    }

    /* ─── FOOTER ─────────────────────────────── */
    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      border-top: 1px solid rgba(255,255,255,0.07);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0b0f;
    }

    .footer-logo {
      font-size: 0.76rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      color: rgba(255,255,255,0.28);
      text-transform: uppercase;
    }

    /* ─── RESPONSIVE ──────────────────────────── */
    @media (max-width: 600px) {
      .nav-center { display: none; }
      .hamburger { display: flex; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="#" class="nav-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M11 2C11 2 4 5.2 4 11.8C4 16.8 7.2 19.6 11 20C14.8 19.6 18 16.8 18 11.8C18 5.2 11 2 11 2Z" stroke="white" stroke-width="1.3" fill="none"/>
          <path d="M11 6.5C11 6.5 7.8 8.5 7.8 12C7.8 14.6 9.2 16.2 11 16.8C12.8 16.2 14.2 14.6 14.2 12C14.2 8.5 11 6.5 11 6.5Z" fill="white"/>
        </svg>
      </div>
      <span class="logo-text">CHIRON</span>
    </a>

    <div class="nav-center">
      <a href="#">Team</a>
      <a href="#">Documentation</a>
      <a href="#">Sponsors</a>
      <a href="#">Robot</a>
    </div>

    <div class="nav-right">
      <button class="hamburger" id="hamburger" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
      <button class="boink-btn" id="boinkBtn" aria-label="Happy button">😊</button>
    </div>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <a href="#">Team</a>
    <a href="#">Documentation</a>
    <a href="#">Sponsors</a>
    <a href="#">Robot</a>
  </div>

  <footer>
    <div class="footer-logo">CHIRON Robotics</div>
  </footer>

  <script>
    // ── Boink sound ──
    const boinkBtn = document.getElementById('boinkBtn');

    function playBoink() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const now = ctx.currentTime;

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(520, now);
      osc.frequency.exponentialRampToValueAtTime(80, now + 0.28);
      gain.gain.setValueAtTime(0.55, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.32);
      osc.start(now);
      osc.stop(now + 0.33);

      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.connect(gain2);
      gain2.connect(ctx.destination);
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(780, now);
      osc2.frequency.exponentialRampToValueAtTime(140, now + 0.22);
      gain2.gain.setValueAtTime(0.2, now);
      gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
      osc2.start(now);
      osc2.stop(now + 0.24);
    }

    boinkBtn.addEventListener('click', () => {
      playBoink();
      boinkBtn.classList.remove('boinking');
      void boinkBtn.offsetWidth;
      boinkBtn.classList.add('boinking');
      boinkBtn.addEventListener('animationend', () => boinkBtn.classList.remove('boinking'), { once: true });
    });

    // ── Hamburger menu ──
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');

    hamburger.addEventListener('click', () => {
      mobileMenu.classList.toggle('open');
    });

    mobileMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => mobileMenu.classList.remove('open'));
    });
  </script>
</body>
</html>
