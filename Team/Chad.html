<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHIRON Robotics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      background: #0a0b0f;
      color: #fff;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    /* ─── NAVBAR ─────────────────────────────── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 52px;
      background: #0a0b0f;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 100;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-icon svg {
      width: 22px;
      height: 22px;
      display: block;
    }

    .logo-text {
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: #fff;
      text-transform: uppercase;
    }

    /* Desktop Navigation */
    .nav-center {
      display: flex;
      align-items: center;
      gap: 2px;
      position: relative;
    }

    .nav-center a {
      font-size: 0.82rem;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.65);
      text-decoration: none;
      padding: 6px 14px;
      transition: color 0.15s;
      white-space: nowrap;
    }

    .nav-center a:hover {
      color: #fff;
    }

    /* Dropdown Styles */
    .dropdown {
      position: relative;
      display: inline-block;
    }

    .dropbtn {
      font-size: 0.82rem;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.65);
      background: none;
      border: none;
      padding: 6px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color 0.15s;
    }

    .dropbtn:hover {
      color: #fff;
    }

    .dropbtn::after {
      content: "▼";
      font-size: 0.68rem;
      opacity: 0.6;
      transition: transform 0.2s ease;
    }

    .dropdown:hover .dropbtn::after {
      transform: rotate(180deg);
    }

    .dropdown-content {
      display: none;
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      background-color: #0a0b0f;
      min-width: 170px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      z-index: 101;
      padding: 8px 0;
      margin-top: 6px;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    .dropdown-content a {
      color: rgba(255, 255, 255, 0.8);
      padding: 10px 20px;
      text-decoration: none;
      display: block;
      font-size: 0.82rem;
      transition: all 0.2s;
    }

    .dropdown-content a:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      padding-left: 26px;
    }

    /* Boink Button - Fixed & Cleaned */
    .boink-btn {
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      cursor: pointer;
      transition: all 0.2s ease;
      flex-shrink: 0;
      line-height: 1;
    }

    .boink-btn:hover {
      border-color: rgba(255, 255, 255, 0.55);
      background: rgba(255, 255, 255, 0.07);
      transform: scale(1.05);
    }

    .boink-btn.boinking {
      animation: boink-pop 0.42s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    }

    @keyframes boink-pop {
      0% {
        transform: scale(1) rotate(0deg);
      }

      25% {
        transform: scale(1.6) rotate(-10deg);
      }

      50% {
        transform: scale(0.85) rotate(8deg);
      }

      75% {
        transform: scale(1.15) rotate(-4deg);
      }

      100% {
        transform: scale(1) rotate(0deg);
      }
    }

    /* Hamburger */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }

    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: rgba(255, 255, 255, 0.85);
      transition: all 0.2s;
    }

    /* Mobile Menu */
    .mobile-menu {
      display: none;
      position: fixed;
      top: 52px;
      left: 0;
      right: 0;
      background: #0a0b0f;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      flex-direction: column;
      z-index: 99;
    }

    .mobile-menu.open {
      display: flex;
    }

    .mobile-menu .team-header,
    .mobile-menu a {
      font-size: 0.92rem;
      color: rgba(255, 255, 255, 0.75);
      text-decoration: none;
      padding: 16px 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.2s;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .mobile-menu .team-header:hover,
    .mobile-menu a:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.05);
    }

    .mobile-submenu {
      display: none;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.03);
    }

    .mobile-submenu.open {
      display: flex;
    }

    .mobile-submenu a {
      padding-left: 52px;
      font-size: 0.87rem;
      border-bottom: none;
    }

    /* Footer */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      border-top: 1px solid rgba(255, 255, 255, 0.07);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0b0f;
    }

    .footer-logo {
      font-size: 0.76rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      color: rgba(255, 255, 255, 0.28);
      text-transform: uppercase;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .nav-center {
        display: none;
      }

      .hamburger {
        display: flex;
      }
    }

    @media (min-width: 601px) {
      .hamburger {
        display: none;
      }

      .mobile-menu {
        display: none !important;
      }
    }
  </style>
</head>

<body>

  <nav>
    <a href="#" class="nav-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M11 2C11 2 4 5.2 4 11.8C4 16.8 7.2 19.6 11 20C14.8 19.6 18 16.8 18 11.8C18 5.2 11 2 11 2Z"
            stroke="white" stroke-width="1.3" fill="none" />
          <path
            d="M11 6.5C11 6.5 7.8 8.5 7.8 12C7.8 14.6 9.2 16.2 11 16.8C12.8 16.2 14.2 14.6 14.2 12C14.2 8.5 11 6.5 11 6.5Z"
            fill="white" />
        </svg>
      </div>
      <span class="logo-text">CHIRON</span>
    </a>

    <div class="nav-center">
      <div class="dropdown">
        <button class="dropbtn">Team</button>
        <div class="dropdown-content">
          <a href="#">Chad</a>
          <a href="#">Andre</a>
          <a href="#">Domonic</a>
          <a href="#">Alexa</a>
          <a href="#">Zahid</a>
          <a href="#">Matthew</a>
        </div>
      </div>
      <a href="#">Documentation</a>
      <a href="#">Sponsors</a>
      <a href="#">Robot</a>
    </div>

    <div class="nav-right">
      <button class="hamburger" id="hamburger" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
      <button class="boink-btn" id="boinkBtn" aria-label="Happy button">😊</button>
    </div>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <div class="team-header" id="teamHeader">
      Team <span id="teamArrow">▼</span>
    </div>
    <div class="mobile-submenu" id="mobileSubmenu">
      <a href="#">Chad</a>
      <a href="#">Andre</a>
      <a href="#">Domonic</a>
      <a href="#">Alexa</a>
      <a href="#">Zahid</a>
      <a href="#">Matthew</a>
    </div>
    <a href="#">Documentation</a>
    <a href="#">Sponsors</a>
    <a href="#">Robot</a>
  </div>

  <footer>
    <div class="footer-logo">CHIRON Robotics</div>
  </footer>

  <script>
    // ── Boink Button ──
    const boinkBtn = document.getElementById('boinkBtn');

    function playBoink() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const now = ctx.currentTime;

      // First tone
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(520, now);
      osc.frequency.exponentialRampToValueAtTime(80, now + 0.28);
      gain.gain.setValueAtTime(0.55, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.32);
      osc.start(now);
      osc.stop(now + 0.33);

      // Second tone
      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.connect(gain2);
      gain2.connect(ctx.destination);
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(780, now);
      osc2.frequency.exponentialRampToValueAtTime(140, now + 0.22);
      gain2.gain.setValueAtTime(0.2, now);
      gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
      osc2.start(now);
      osc2.stop(now + 0.24);
    }

    boinkBtn.addEventListener('click', () => {
      playBoink();

      // Trigger animation
      boinkBtn.classList.remove('boinking');
      void boinkBtn.offsetWidth; // Force reflow
      boinkBtn.classList.add('boinking');

      boinkBtn.addEventListener('animationend', () => {
        boinkBtn.classList.remove('boinking');
      }, { once: true });
    });

    // ── Mobile Menu ──
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    const teamHeader = document.getElementById('teamHeader');
    const mobileSubmenu = document.getElementById('mobileSubmenu');
    const teamArrow = document.getElementById('teamArrow');

    hamburger.addEventListener('click', () => {
      mobileMenu.classList.toggle('open');
    });

    // Team submenu toggle
    teamHeader.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = mobileSubmenu.classList.toggle('open');
      teamArrow.style.transform = isOpen ? 'rotate(180deg)' : 'rotate(0deg)';
    });

    // Close menu when clicking links
    mobileMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        mobileMenu.classList.remove('open');
      });
    });
  </script>
</body>

</html>
